<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marksheet</title>
<style>
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#16233a;
    font-family:'Segoe UI', Arial, sans-serif;
    padding:20px;
  }
  .box{
    background:#fff;
    width:100%;
    max-width:460px;
    border-radius:16px;
    padding:30px 28px;
    box-shadow:0 20px 45px rgba(0,0,0,.35);
  }
  h1{
    font-family:Georgia, 'Times New Roman', serif;
    color:#16233a;
    text-align:center;
    font-size:1.4rem;
    margin:0 0 10px;
  }
  p.note{
    color:#666;
    font-size:.85rem;
    text-align:center;
    margin-bottom:20px;
  }
  button{
    display:block;
    margin:0 auto;
    padding:12px 26px;
    border:none;
    border-radius:10px;
    background:#16233a;
    color:#fff;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:background .2s;
  }
  button:hover{ background:#c08a28; }
  .output{
    margin-top:22px;
    padding:16px 18px;
    background:#fbf6ea;
    border:1px dashed #c08a28;
    border-radius:8px;
    font-family:'Consolas','Courier New', monospace;
    font-size:.92rem;
    white-space:pre-wrap;
    min-height:1.2em;
  }
</style>
</head>
<body>

  <div class="box">
    <h1>Marksheet Generator</h1>
    <p class="note">
      Enter marks (out of 100) for English, Math and Computer.<br>
      Grading: 90%+ = A+, 80-89% = A, 70-79% = B, 60-69% = C, below 60% = Fail.
    </p>
    <button onclick="generateMarksheet()">Enter Marks</button>
    <div class="output" id="output">Result will appear here…</div>
  </div>

<script>
function generateMarksheet(){
  const english = Number(prompt("Enter marks in English (out of 100):"));
  const math = Number(prompt("Enter marks in Math (out of 100):"));
  const computer = Number(prompt("Enter marks in Computer (out of 100):"));

  const totalMarks = 300;
  const obtainedMarks = english + math + computer;
  const percentage = (obtainedMarks / totalMarks) * 100;

  let grade;
  if (percentage >= 90) grade = "A+";
  else if (percentage >= 80) grade = "A";
  else if (percentage >= 70) grade = "B";
  else if (percentage >= 60) grade = "C";
  else grade = "Fail";

  document.getElementById('output').textContent =
    "English      : " + english + "\n" +
    "Math         : " + math + "\n" +
    "Computer     : " + computer + "\n" +
    "-----------------------------\n" +
    "Total Marks  : " + totalMarks + "\n" +
    "Obtained     : " + obtainedMarks + "\n" +
    "Percentage   : " + percentage.toFixed(2) + "%\n" +
    "Grade        : " + grade;
}
</script>

</body>
</html>
