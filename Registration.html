<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<style>
  *{ box-sizing:border-box; }
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#16233a;
    font-family:'Segoe UI', Arial, sans-serif;
    padding:20px;
  }
  .form-box{
    background:#fff;
    width:100%;
    max-width:420px;
    border-radius:16px;
    padding:32px 30px;
    box-shadow:0 20px 45px rgba(0,0,0,.35);
    transition:box-shadow .25s;
  }
  .form-box:hover{
    box-shadow:0 24px 55px rgba(0,0,0,.45);
  }
  h1{
    font-family:Georgia, 'Times New Roman', serif;
    color:#16233a;
    text-align:center;
    font-size:1.4rem;
    margin:0 0 22px;
  }
  label{
    display:block;
    font-weight:600;
    font-size:.9rem;
    color:#223252;
    margin:14px 0 6px;
  }
  input[type=text], input[type=email], input[type=password], input[type=number]{
    width:100%;
    padding:11px 12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:1rem;
    font-family:inherit;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{
    outline:none;
    border-color:#c08a28;
    box-shadow:0 0 0 3px rgba(192,138,40,.2);
  }
  .radio-row{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    margin-top:4px;
  }
  .radio-row label{
    display:flex;
    align-items:center;
    gap:6px;
    font-weight:normal;
    margin:0;
    font-size:.92rem;
  }
  button{
    width:100%;
    margin-top:22px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#16233a;
    color:#fff;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:background .2s, transform .1s;
  }
  button:hover{ background:#c08a28; }
  button:active{ transform:translateY(1px); }
  .success{
    display:none;
    margin-top:16px;
    padding:12px 14px;
    background:#eaf5ee;
    border:1px solid #2f7a4f;
    color:#2f7a4f;
    border-radius:8px;
    font-size:.88rem;
    text-align:center;
  }

  /* Responsive */
  @media (max-width:480px){
    .form-box{ padding:24px 18px; }
  }
</style>
</head>
<body>

  <div class="form-box">
    <h1>Registration Form</h1>
    <form onsubmit="return handleSubmit(event)">

      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" required placeholder="Enter your full name">

      <label for="email">Email</label>
      <input type="email" id="email" required placeholder="Enter your email">

      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" placeholder="At least 6 characters">

      <label for="age">Age</label>
      <input type="number" id="age" required min="1" placeholder="Enter your age">

      <label>Gender</label>
      <div class="radio-row">
        <label><input type="radio" name="gender" value="Male" required> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>
        <label><input type="radio" name="gender" value="Other"> Other</label>
      </div>

      <label for="city">City</label>
      <input type="text" id="city" required placeholder="Enter your city">

      <button type="submit">Submit</button>

      <div class="success" id="successMsg"></div>
    </form>
  </div>

<script>
  function handleSubmit(e){
    e.preventDefault();
    const name = document.getElementById('fullName').value;
    const box = document.getElementById('successMsg');
    box.style.display = 'block';
    box.textContent = 'Thank you, ' + name + '! Your registration was submitted.';
    return false;
  }
</script>

</body>
</html>
